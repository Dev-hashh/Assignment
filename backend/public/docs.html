<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>API Documentation</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1c2430;
        --muted: #647084;
        --line: #d8dee8;
        --primary: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .app {
        width: min(1100px, calc(100% - 32px));
        margin: 32px auto;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 22px;
      }

      .eyebrow {
        margin: 0;
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .muted {
        margin: 0 0 16px;
        color: var(--muted);
      }

      pre {
        white-space: pre-wrap;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <p class="eyebrow">OpenAPI</p>
        <h1>API Documentation</h1>
        <p class="muted">The machine-readable OpenAPI file is available at <a href="/openapi.json">/openapi.json</a>.</p>
        <pre id="spec"></pre>
      </section>
    </main>
    <script>
      fetch('/openapi.json').then(r => r.json()).then(spec => {
        document.querySelector('#spec').textContent = JSON.stringify(spec, null, 2);
      });
    </script>
  </body>
</html>
