version: "3.9"

services:
  backend:
    build: ./backend
    container_name: assignment-backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: assignment-frontend
    ports:
      - "5174:5174"
    depends_on:
      - backend
    restart: unless-stopped